<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>☕ Campus Cravings</h1>
    <p>Admin Panel</p>
</header>

<nav>
    <a href="index.html">🍽️ Menu</a>
    <a href="cart.html">🛒 Cart</a>
</nav>

<div class="container" id="loginSection">
    <h2>🔐 Admin Login</h2>
    <div class="checkout-box">
        <input id="adminUser" placeholder="Username">
        <input id="adminPass" type="password" placeholder="Password">
        <p id="loginError" style="color:#b05050; font-size:0.85rem; margin-top:6px; display:none;">Wrong username or password.</p>
        <button onclick="checkLogin()">Login</button>
    </div>
</div>

<div class="container" id="ordersSection" style="display:none;">
    <h2>⚙️ Orders</h2>
    <div id="orders"></div>
    <button onclick="logout()" style="margin-top:20px; background:#c2a898;">Logout</button>
</div>

<script src="admin.js"></script>
</body>
</html>
